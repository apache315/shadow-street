version: '3.9'

services:
  backend:
    build: ./backend
    volumes:
      - osm_cache:/app/data/osm_cache
      - shadow_cache:/app/data/shadow_cache
    environment:
      - TZ=Europe/Rome
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 300s

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  osm_cache:
  shadow_cache:
